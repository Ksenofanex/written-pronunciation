{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}
<div class="form-card">
    <h1>New Word</h1>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-4">
            <button class="btn btn-primary w-100" type="submit">Send Word</button>
        </div>
    </form>
</div>
{% endblock content %}
