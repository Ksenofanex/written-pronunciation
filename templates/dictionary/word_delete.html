{% extends 'base.html' %}

{% block content %}
<div class="form-container delete-section">
  <div class="form-title danger">Delete Word</div>
  <div class="form-subtitle">This action cannot be undone</div>

  <div class="delete-word">{{ word.english }}</div>

  <form action="" method="post">
    {% csrf_token %}
    <div class="delete-actions">
      <a href="{% url 'word-detail' word.pk %}">Cancel</a>
      <button class="btn-confirm" type="submit">Confirm Delete</button>
    </div>
  </form>
</div>
{% endblock content %}
