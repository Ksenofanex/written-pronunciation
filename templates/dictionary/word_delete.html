{% extends 'base.html' %}

{% block content %}
<div class="card delete-card">
    <div class="card-body">
        <div class="delete-word">{{ word.english }}</div>
        <p class="text-secondary mb-4">Are you sure you want to delete this word?</p>
        <form action="" method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'word-detail' word.pk %}" class="btn btn-outline-primary">Cancel</a>
                <button class="btn btn-danger" type="submit">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
