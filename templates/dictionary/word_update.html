{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}
<div class="form-container-wide">
  <div class="form-title">Edit Word</div>
  <div class="form-subtitle">Update pronunciation entry</div>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="form-submit" type="submit">Save Changes</button>
  </form>
</div>
{% endblock content %}
