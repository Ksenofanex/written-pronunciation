{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Log in{% endblock title %}

{% block content %}
<div class="form-card">
    <h2>Log in</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-4">
            <button class="btn btn-primary w-100" type="submit">Log in</button>
        </div>
    </form>
</div>
{% endblock content %}
