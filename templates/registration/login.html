{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Log in{% endblock title %}

{% block content %}
<div class="form-container">
  <div class="form-title">Log In</div>
  <div class="form-subtitle">Access your account</div>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="form-submit" type="submit">Log In</button>
  </form>

  <div class="form-footer">
    <a href="{% url 'signup' %}" class="form-link">Don't have an account? Sign up</a>
  </div>
</div>
{% endblock content %}
