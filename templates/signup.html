{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}Sign Up{% endblock title %}

{% block content %}
<div class="form-container">
  <div class="form-title">Sign Up</div>
  <div class="form-subtitle">Create a new account</div>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="form-submit" type="submit">Create Account</button>
  </form>

  <div class="form-footer">
    <a href="{% url 'login' %}" class="form-link">Already have an account? Log in</a>
  </div>
</div>
{% endblock content %}
